<html xmlns="http://www.w3.org/1999/xhtml" lang="en"
    xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
    xmlns:s="http://typo3.org/ns/ApacheSolrForTypo3/Solr/ViewHelpers"
    data-namespace-typo3-fluid="true"
>

<f:argument name="pagination" type="GeorgRinger\NumberedPagination\NumberedPagination" />
<f:argument name="currentPage" type="int" />

<f:section name="Pagination">
    <f:if condition="{pagination.allPageNumbers -> f:count()} > 1">
        <f:variable name="totalPages" value="{pagination.lastPageNumber}" />
        <nav class="mx-auto flex w-full justify-center solr-pagination" role="navigation" aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.label', arguments: {totalPages: totalPages})}">
            <ul class="flex flex-row items-center gap-1">
                <f:if condition="{pagination.previousPageNumber}">
                    <li>
                        <f:if condition="{pagination.previousPageNumber} > 1">
                            <f:then>
                                <a
                                    class="inline-flex h-9 items-center justify-center gap-1 rounded-md px-2.5 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                                    href="{s:uri.paginate.resultPage(page: pagination.previousPageNumber)}"
                                    aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.previous')}"
                                    rel="prev"
                                >
                                    <span aria-hidden="true">&lsaquo;</span>
                                    <span><f:translate key="LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.previous" /></span>
                                </a>
                            </f:then>
                            <f:else>
                                <a
                                    class="inline-flex h-9 items-center justify-center gap-1 rounded-md px-2.5 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                                    href="{s:uri.paginate.resultPage()}"
                                    aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.previous')}"
                                    rel="prev"
                                >
                                    <span aria-hidden="true">&lsaquo;</span>
                                    <span><f:translate key="LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.previous" /></span>
                                </a>
                            </f:else>
                        </f:if>
                    </li>
                </f:if>

                <f:if condition="{pagination.hasLessPages}">
                    <li>
                        <a
                            class="inline-flex h-9 min-w-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                            href="{s:uri.paginate.resultPage()}"
                            aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.goToPage', arguments: {page: pagination.firstPageNumber, totalPages: totalPages})}"
                        >
                            {pagination.firstPageNumber}
                        </a>
                    </li>
                    <li>
                        <span class="flex h-9 w-9 items-center justify-center text-muted-foreground" aria-hidden="true">&hellip;</span>
                    </li>
                </f:if>

                <f:for each="{pagination.allPageNumbers}" as="page">
                    <f:if condition="{page} == {currentPage}">
                        <f:then>
                            <li>
                                <span
                                    class="inline-flex h-9 min-w-9 items-center justify-center rounded-md border border-input bg-background px-3 text-sm font-medium shadow-sm"
                                    aria-current="page"
                                    aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.currentPage', arguments: {page: page, totalPages: totalPages})}"
                                >
                                    {page}
                                </span>
                            </li>
                        </f:then>
                        <f:else>
                            <li>
                                <f:if condition="{page} > 1">
                                    <f:then>
                                        <a
                                            class="inline-flex h-9 min-w-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                                            href="{s:uri.paginate.resultPage(page: page)}"
                                            aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.goToPage', arguments: {page: page, totalPages: totalPages})}"
                                        >
                                            {page}
                                        </a>
                                    </f:then>
                                    <f:else>
                                        <a
                                            class="inline-flex h-9 min-w-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                                            href="{s:uri.paginate.resultPage()}"
                                            aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.goToPage', arguments: {page: page, totalPages: totalPages})}"
                                        >
                                            {page}
                                        </a>
                                    </f:else>
                                </f:if>
                            </li>
                        </f:else>
                    </f:if>
                </f:for>

                <f:if condition="{pagination.hasMorePages}">
                    <li>
                        <span class="flex h-9 w-9 items-center justify-center text-muted-foreground" aria-hidden="true">&hellip;</span>
                    </li>
                    <li>
                        <a
                            class="inline-flex h-9 min-w-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                            href="{s:uri.paginate.resultPage(page: pagination.lastPageNumber)}"
                            aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.goToPage', arguments: {page: pagination.lastPageNumber, totalPages: totalPages})}"
                        >
                            {pagination.lastPageNumber}
                        </a>
                    </li>
                </f:if>

                <f:if condition="{pagination.nextPageNumber}">
                    <li>
                        <a
                            class="inline-flex h-9 items-center justify-center gap-1 rounded-md px-2.5 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring solr-ajaxified"
                            href="{s:uri.paginate.resultPage(page: pagination.nextPageNumber)}"
                            aria-label="{f:translate(key: 'LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.aria.next')}"
                            rel="next"
                        >
                            <span><f:translate key="LLL:EXT:solr_numbered_pagination/Resources/Private/Language/locallang.xlf:pagination.next" /></span>
                            <span aria-hidden="true">&rsaquo;</span>
                        </a>
                    </li>
                </f:if>
            </ul>
        </nav>
    </f:if>
</f:section>

</html>
